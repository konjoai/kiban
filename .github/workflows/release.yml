name: Release

# Cut a GitHub release straight from VERSION + CHANGELOG.md, with the changelog
# as the single source of truth for the notes. `gh release create` makes the
# tag (vX.Y.Z) and the release together server-side, so no tag has to be pushed
# by hand. Runs when VERSION lands on main, or on manual dispatch; it is
# idempotent, so re-running once the release exists is a no-op.

on:
  push:
    branches: [main]
    paths: ["VERSION"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: v
        run: |
          version="$(cat VERSION)"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Skip if release already exists
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.v.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.v.outputs.tag }} already exists; nothing to do."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog section
        if: steps.check.outputs.exists == 'false'
        run: |
          version="${{ steps.v.outputs.version }}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section found for $version" >&2
            exit 1
          fi
          echo "Release notes for $version:"
          cat release-notes.md

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.v.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.v.outputs.tag }}" \
            --notes-file release-notes.md
