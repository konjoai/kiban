name: Release

# Cut a GitHub release whenever a v* tag is pushed. The release notes are the
# matching section of CHANGELOG.md, so the changelog stays the single source of
# truth and the tag must agree with VERSION.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches VERSION
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(cat VERSION)"
          if [ "$tag" != "$version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION ($version)" >&2
            exit 1
          fi

      - name: Extract changelog section
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "No CHANGELOG section found for $version" >&2
            exit 1
          fi
          echo "Release notes for $version:"
          cat release-notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
