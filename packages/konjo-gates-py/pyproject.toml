# konjo-gates-py is the Python/ML CI-plane orchestrator. Its code lives here, but it is
# built and shipped as part of the root kiban distribution (see the repo-root
# pyproject.toml), because it imports the real lib/ and evals/ engine and a
# subdirectory-only install cannot reach those siblings without duplicating them. This
# file documents the package and lets it be developed in place; the installable
# distribution is the repo root, installed at a pinned ref by consuming repos.

[project]
name = "konjo-gates-py"
version = "0.3.0"
description = "CI-plane gate orchestrator for Konjo Python and ML repos"
requires-python = ">=3.11"
license = { text = "MIT" }

[project.scripts]
konjo-gates = "konjo_gates_py.cli:main"
