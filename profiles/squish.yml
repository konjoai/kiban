# profiles/squish.yml
# Reconciled against the real squish repo in Phase 2 (C-B): konjoai/squish was cloned
# read-only and its actual KCQF state was read (.konjo/hooks/pre-commit,
# .konjo/scripts/konjo_review.py, .github/workflows/konjo-gate.yml, BENCHMARKS.md,
# benchmarks/ollama_vs_squish/bench_thermal_h2h.py, pyproject.toml, requirements.txt).
# The squish checkout was not modified. Fields below are confirmed against that state
# unless marked UNVERIFIED.

repo: squish

# Confirmed: requirements.txt and pyproject.toml declare mlx and mlx-lm (Apple-Silicon
# gated). There is no Cargo.toml, pixi.toml, or Package.swift, so the Phase 0 "swift"
# guess was wrong and is dropped.
stack:
  - python
  - mlx

# Confirmed from .konjo/hooks/pre-commit (ruff lint + ruff format + mypy) and
# .github/workflows/konjo-gate.yml G1 static analysis (vulture for dead code, bandit
# for security).
format_lint:
  - ruff
  - ruff-format
  - mypy
  - vulture
  - bandit

# Confirmed from konjo-gate.yml Wall 2 gates G2 and G4. These are the blocking
# correctness contracts squish enforces in CI.
contract_gates:
  - coverage-80          # G2: pytest coverage gate, fails under 80 percent
  - complexity-radon     # G4: radon complexity gate
  - file-size-500        # G4 and pre-commit: hard limit 500 lines per source file
  - dry                  # G4 and pre-commit: dry_check.py duplicate-block gate
  - docs-interrogate-80  # G4: interrogate docstring coverage, target 80 percent

# Confirmed: konjo-gate.yml G3 runs `mutmut run`.
mutation: mutmut

# kiban-native review lanes for this stack. These drive the kiban specialist engine
# (lib/specialists), not squish's own reviewer. squish's repo-native review is a single
# 10-question adversarial critic (.konjo/scripts/konjo_review.py, Wall 3, critic model
# claude-opus, disabled in CI). numerics and memory-bandwidth map to the MLX inference
# core; api-surface maps to the public squish API; concurrency is retained as a standard
# lane though squish's hot path is single-threaded GEMV.
specialists:
  - numerics
  - memory-bandwidth
  - concurrency
  - api-surface

# Confirmed from BENCHMARKS.md: the headline baseline is "bench v5.1.1" with raw
# artifacts in results/benchmarks_v5_1_1/ (Apple M3, five-run medians). The thermal
# head-to-head bench is benchmarks/ollama_vs_squish/bench_thermal_h2h.py.
prove:
  enabled: true
  baseline: "benchmarks_v5_1_1"

killtest: true

overrides: {}
