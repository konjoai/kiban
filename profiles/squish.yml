# profiles/squish.yml
# Reconciled against the real squish repo in Phase 2 (C-B): konjoai/squish was cloned
# read-only and its actual KCQF state was read (.konjo/hooks/pre-commit,
# .konjo/scripts/konjo_review.py, .github/workflows/konjo-gate.yml, BENCHMARKS.md,
# benchmarks/ollama_vs_squish/bench_thermal_h2h.py, pyproject.toml, requirements.txt).
# The squish checkout was not modified. Fields below are confirmed against that state
# unless marked UNVERIFIED.

repo: squish

# Confirmed: requirements.txt and pyproject.toml declare mlx and mlx-lm (Apple-Silicon
# gated). There is no Cargo.toml, pixi.toml, or Package.swift, so the Phase 0 "swift"
# guess was wrong and is dropped.
stack:
  - python
  - mlx

# Confirmed from .konjo/hooks/pre-commit (ruff lint + ruff format + mypy) and
# .github/workflows/konjo-gate.yml G1 static analysis (vulture for dead code, bandit
# for security).
format_lint:
  - ruff
  - ruff-format
  - mypy
  - vulture
  - bandit

# Confirmed from konjo-gate.yml Wall 2 gates G2 and G4. These are the blocking
# correctness contracts squish enforces in CI.
contract_gates:
  - coverage-80          # G2: pytest coverage gate, fails under 80 percent
  - complexity-radon     # G4: radon complexity gate
  - file-size-500        # G4 and pre-commit: hard limit 500 lines per source file
  - dry                  # G4 and pre-commit: dry_check.py duplicate-block gate
  - docs-interrogate-80  # G4: interrogate docstring coverage, target 80 percent

# Confirmed: konjo-gate.yml G3 runs `mutmut run`.
mutation: mutmut

# kiban-native review lanes for this stack. These drive the kiban specialist engine
# (lib/specialists), not squish's own reviewer. squish's repo-native review is a single
# 10-question adversarial critic (.konjo/scripts/konjo_review.py, Wall 3, critic model
# claude-opus, disabled in CI). numerics and memory-bandwidth map to the MLX inference
# core; api-surface maps to the public squish API; concurrency is retained as a standard
# lane though squish's hot path is single-threaded GEMV.
specialists:
  - numerics
  - memory-bandwidth
  - concurrency
  - api-surface

# Confirmed from BENCHMARKS.md: the headline baseline is "bench v5.1.1" with raw
# artifacts in results/benchmarks_v5_1_1/ (Apple M3, five-run medians). The thermal
# head-to-head bench is benchmarks/ollama_vs_squish/bench_thermal_h2h.py.
prove:
  enabled: true
  baseline: "benchmarks_v5_1_1"
  # Phase 5: wired against the real squish bench, read over HTTPS from
  # github.com/konjoai/squish (benchmarks/ollama_vs_squish/bench_thermal_h2h.py and
  # bench_v5_1.py). The bench takes no argparse args; it is env-var driven and writes
  # results/benchmarks_v5_1_1/thermal/<UTC>.json. Per-run e2e measurements live under
  # configs[<id>].phases[<phase>].e2e_runs with the key total_s (end-to-end wall clock,
  # seconds, lower is better). The metric we prove is e2e_200tok_s at the p4000 phase.
  metric: "e2e_200tok_s"
  unit: "s"
  lower_is_better: true
  run_floor: 30
  perf_globs:
    - "benchmarks/**"
    - "squish/**"
  bench_cmd: "python benchmarks/ollama_vs_squish/bench_thermal_h2h.py"
  # The adapter maps the bench JSON to the konjo-prove artifact:
  #   konjo-prove adapt --bench <thermal/*.json ...> --config <squish_config_id> \
  #     --phase p4000 --metric e2e_200tok_s --out candidate.json
  bench_adapter: "konjo-prove adapt (lib/bench_squish.py)"

  # min_effect_pct is PENDING USER CONFIRMATION. It is the "what counts as a real win"
  # threshold and must NOT be invented. bench_v5_1.RUNS == 5, so one thermal run yields
  # only 5 paired measurements, below the 30-run floor; and the run-to-run jitter that
  # sets the noise floor must be measured on the M3 bench hardware (unavailable in the
  # build environment). Until activated, konjo-prove run refuses a verdict (exit 3,
  # "NOT ACTIVATED") and the CI prove gate keeps blocking perf changes; it never passes
  # a perf change silently while inert.
  min_effect_pct: null   # PENDING: derive per the checklist below, then confirm
  activation_checklist:
    - "On the M3 bench hardware, run bench_cmd at least 6 times under thermal control so >= 30 paired runs accumulate (RUNS=5 per file)."
    - "Use the bench's own DRIFT CHECK (ollama first vs last) to confirm thermal fairness for each capture."
    - "Adapt the runs: konjo-prove adapt --bench thermal/*.json --config <squish_config_id> --phase p4000 --out baseline.json"
    - "Measure run-to-run jitter on baseline.json (coefficient of variation, or MAD as a percent of the median of total_s)."
    - "Set min_effect_pct above that noise floor (a win must exceed the bench's own jitter), then confirm the number here."
    - "Capture the golden: konjo-prove baseline capture --tag benchmarks_v5_1_1 --results baseline.json"

killtest: true

overrides: {}
